name: Dependency Check (Cache Builder)

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at 00:00 UTC
  workflow_dispatch:
    inputs:
      force_update:
        description: "Force update even if already fresh"
        required: false
        default: "false"
      update_only:
        description: "Only update cache (skip scan)"
        required: false
        default: "false"

jobs:
  dependency-check-cache:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository (default branch)
      - name: Checkout
        uses: actions/checkout@v4

      # Restore Maven dependencies
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      # Restore Dependency-Check cache
      - name: Restore Dependency-Check cache
        id: dccache
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: dependency-check-${{ runner.os }}-${{ runner.arch }}

      # Debug cache state
      - name: Debug cache state
        run: |
          echo "Cache hit: ${{ steps.dccache.outputs.cache-hit }}"
          ls -la ~/.m2/repository/org/owasp || true
          ls -la ~/.m2/repository/org/owasp/dependency-check-data || true

      # Update NVD DB
      - name: Update NVD DB
        id: update
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          OSS_INDEX_USERNAME: ${{ secrets.OSS_INDEX_USERNAME }}
          OSS_INDEX_PASSWORD: ${{ secrets.OSS_INDEX_PASSWORD }}
          NVD_MAX_RETRY: "50"
          NVD_API_DELAY: "6000"
          NVD_VALID_HOURS: "24"
          NVD_RESULTS_PER_PAGE: "2000"
        run: |
          echo "Checking NVD availability..."

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://services.nvd.nist.gov/rest/json/cves/2.0?resultsPerPage=1")

          echo "NVD status: $STATUS"

          if [ "$STATUS" = "200" ]; then
            echo "Updating DB..."

            if mvn org.owasp:dependency-check-maven:update-only \
                -DnvdApiKey=${NVD_API_KEY} \
                -DnvdMaxRetryCount=${NVD_MAX_RETRY} \
                -DnvdApiDelay=${NVD_API_DELAY} \
                -DnvdValidForHours=${NVD_VALID_HOURS} \
                -DnvdApiResultsPerPage=${NVD_RESULTS_PER_PAGE}; then
              echo "success=true" >> $GITHUB_OUTPUT
            else
              echo "success=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "NVD unavailable → skipping update"
            echo "success=false" >> $GITHUB_OUTPUT
          fi

      # Save cache ONLY if update succeeded
      - name: Save updated cache
        if: steps.update.outputs.success == 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: dependency-check-${{ runner.os }}-${{ runner.arch }}

      # Update-only mode info
      - name: Info (update-only mode)
        if: github.event.inputs.update_only == 'true'
        run: echo "Update-only mode enabled → skipping scan"

      # Run scan (optional)
      - name: Run Dependency-Check
        if: github.event.inputs.update_only != 'true'
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          OSS_INDEX_USERNAME: ${{ secrets.OSS_INDEX_USERNAME }}
          OSS_INDEX_PASSWORD: ${{ secrets.OSS_INDEX_PASSWORD }}
        run: |
          mvn dependency-check:check \
            -Ddependency-check.skipUpdates=true \
            -DfailOnError=false
      
      # Upload report
      - name: Upload report
        if: github.event.inputs.update_only != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          if-no-files-found: ignore